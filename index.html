<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="ArangoDB multi-hop knowledge graph browser with search, traversal, clustering, and visualization."
    />
    <title>2WikiMultihopQA · 多跳知识图谱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;750;850&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <a class="skip-nav" href="#main-workspace">跳到图谱区域</a>

    <main class="app-shell">
      <aside class="side-panel" aria-label="数据检索与问题列表">
        <section class="sidebar-brand">
          <h1>2WikiMultihopQA</h1>
          <a class="repo-link" href="https://github.com/AidenBaiZe/multihop-kg-browser" target="_blank" rel="noreferrer">
            <i data-lucide="github" aria-hidden="true"></i>
            <span>GitHub</span>
          </a>
        </section>

        <section class="control-block" aria-label="检索">
          <label class="field search-field">
            <span>检索</span>
            <input id="search-input" type="search" placeholder="question / answer / type / cluster" autocomplete="off" />
          </label>
          <div id="type-filter" class="type-filter" role="group" aria-label="题型筛选"></div>
        </section>

        <section class="metric-grid" aria-label="图谱指标">
          <div class="metric">
            <strong id="metric-questions">0</strong>
            <span>matching questions</span>
          </div>
          <div class="metric">
            <strong id="metric-nodes">0</strong>
            <span>visible nodes</span>
          </div>
          <div class="metric">
            <strong id="metric-edges">0</strong>
            <span>visible edges</span>
          </div>
          <div class="metric">
            <strong id="metric-clusters">0</strong>
            <span>clusters</span>
          </div>
        </section>

        <section class="control-block traversal-block" aria-label="多跳查询">
          <div class="compact-title">
            <i data-lucide="route" aria-hidden="true"></i>
            <h2>多跳查询</h2>
          </div>
          <label class="field">
            <span>起点实体</span>
            <input id="start-node" list="node-options" type="search" autocomplete="off" />
            <datalist id="node-options"></datalist>
          </label>
          <label class="field">
            <span>最大跳数</span>
            <input id="depth-range" type="range" min="1" max="3" value="2" />
          </label>
          <div class="inline-status" aria-live="polite">
            <span id="depth-label">2 hops</span>
            <span id="path-count">0 paths</span>
          </div>
          <button id="run-traversal" class="primary-action" type="button">
            <i data-lucide="play" aria-hidden="true"></i>
            <span>运行查询</span>
          </button>
        </section>

        <section class="control-block cluster-control" aria-label="聚类控制">
          <label class="field">
            <span>聚类方式</span>
            <select id="cluster-mode">
              <option value="topic">主题字段</option>
              <option value="component">连通分量</option>
              <option value="type">节点类型</option>
            </select>
          </label>
          <label class="check-row">
            <input id="label-toggle" type="checkbox" checked />
            <span>显示节点标签</span>
          </label>
        </section>

        <section class="question-block" aria-label="查询样例">
          <div class="question-block-head">
            <h2>查询样例</h2>
            <span id="result-count" class="muted-count">0</span>
          </div>
          <div id="question-list" class="question-list"></div>
        </section>
      </aside>

      <section id="main-workspace" class="workspace" aria-label="图谱工作区">
        <header class="workspace-header">
          <div class="question-heading">
            <p class="eyebrow">ArangoDB property graph</p>
            <h2 id="hero-question">加载问题中</h2>
            <p id="hero-meta">Answer: - | Type: - | Cluster: -</p>
          </div>
          <div class="workspace-tabs segmented" role="group" aria-label="图视图">
            <button class="segment is-active" type="button" data-view="question">Graph</button>
            <button class="segment" type="button" data-view="neighborhood">Evidence</button>
            <button class="segment" type="button" data-view="all">Clusters</button>
          </div>
        </header>

        <section class="graph-panel" aria-label="关系图">
          <div class="graph-toolbar">
            <div>
              <h2 id="graph-title">证据路径</h2>
              <p id="graph-subtitle">加载图数据中</p>
            </div>
            <div class="tool-buttons" role="group" aria-label="图操作">
              <button id="fit-graph" class="icon-button" type="button" title="适配画布" aria-label="适配画布">
                <i data-lucide="maximize" aria-hidden="true"></i>
              </button>
              <button id="pin-selected" class="icon-button" type="button" title="固定选中节点" aria-label="固定选中节点">
                <i data-lucide="pin" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <svg id="graph" role="img" aria-label="知识图谱可视化"></svg>
          <div class="graph-legend" aria-label="图例">
            <span><i class="legend-dot question-dot"></i>Question</span>
            <span><i class="legend-dot article-dot"></i>Entity</span>
            <span><i class="legend-dot sentence-dot"></i>Evidence</span>
            <span><i class="legend-dot answer-dot"></i>Answer</span>
          </div>
          <div id="tooltip" class="tooltip" hidden></div>
        </section>

        <section class="insight-grid" aria-label="证据和聚类详情">
          <section class="panel evidence-panel">
            <div class="panel-title">
              <i data-lucide="file-text" aria-hidden="true"></i>
              <h2>证据详情</h2>
            </div>
            <article id="detail-card" class="detail-card"></article>
          </section>

          <section class="panel">
            <div class="panel-title">
              <i data-lucide="git-branch" aria-hidden="true"></i>
              <h2>路径结果</h2>
            </div>
            <div id="path-results" class="path-results"></div>
          </section>

          <section class="panel">
            <div class="panel-title">
              <i data-lucide="bar-chart-3" aria-hidden="true"></i>
              <h2>聚类分布</h2>
            </div>
            <div id="cluster-chart" class="cluster-chart"></div>
          </section>

          <section class="panel code-panel">
            <div class="panel-title">
              <i data-lucide="terminal-square" aria-hidden="true"></i>
              <h2>AQL 示例</h2>
            </div>
            <pre><code id="aql-code"></code></pre>
          </section>
        </section>
      </section>
    </main>

    <noscript>此网页需要启用 JavaScript 才能渲染图谱。</noscript>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
